apiVersion: apps/v1
kind: Deployment
metadata:
  name: techmarket-orders-api
  labels:
    app: orders-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
        - name: orders-container
          image: 368336158612.dkr.ecr.us-east-1.amazonaws.com/techmarket-orders:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: techmarket-orders-service
spec:
  type: LoadBalancer
  selector:
    app: orders-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80